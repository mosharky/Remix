[fog_modifiers]
	#If any custom fog modifiers are enabled
	fogModifiers = false
	#If the caves biome fog modifier is enabled
	cavesBiomeFogModifier = false
	#If the deep dark fog modifier is enabled
	deepDarkFogModifier = false
	#If the foggy biome fog modifier is enabled
	foggyBiomeFogModifier = false

[inverted_bell_client]
	#Whether to apply a blur effect while teleporting via Inverted Bell
	invertedBellBlur = true
